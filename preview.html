<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>打地鼠遊戲</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#9be7ff;
}

h1{
margin-top:20px;
}

#score{
font-size:24px;
margin:10px;
}

.game{
width:360px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,120px);
grid-gap:10px;
}

.hole{
width:120px;
height:120px;
background:#654321;
border-radius:50%;
position:relative;
cursor:pointer;
}

.mole{
width:100px;
height:100px;
background:brown;
border-radius:50%;
position:absolute;
bottom:0;
left:10px;
display:none;
}

.show{
display:block;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:18px;
}
</style>

</head>

<body>

<h1>🐹 打地鼠遊戲</h1>
<div id="score">分數: 0</div>

<div class="game">
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
<div class="hole"><div class="mole"></div></div>
</div>

<button onclick="startGame()">開始遊戲</button>

<script>

let score = 0
let gameRunning = false

const moles = document.querySelectorAll(".mole")

function randomMole(){
moles.forEach(m=>m.classList.remove("show"))

let index = Math.floor(Math.random()*moles.length)
moles[index].classList.add("show")
}

moles.forEach(mole=>{
mole.addEventListener("click",()=>{
if(!gameRunning) return
score++
document.getElementById("score").innerText="分數: "+score
mole.classList.remove("show")
})
})

function startGame(){

score = 0
gameRunning = true

document.getElementById("score").innerText="分數: 0"

let gameLoop = setInterval(randomMole,800)

setTimeout(()=>{
clearInterval(gameLoop)
gameRunning=false
alert("遊戲結束! 你的分數: "+score)
},15000)

}

</script>

</body>
</html>
